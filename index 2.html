<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Jasmine 🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  overflow: hidden;
  color: white;
  text-align: center;
}

/* Intro screen */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #ff758c;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  font-size: 1.5rem;
}

/* Main content */
.container {
  margin-top: 100px;
  opacity: 0;
  transition: 2s;
}

h1 {
  font-size: 2.5rem;
}

p {
  max-width: 400px;
  margin: 10px auto;
}

/* Button */
button {
  padding: 10px 20px;
  border: none;
  background: white;
  color: #ff4d6d;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 20px;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: pink;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh) scale(0);}
  100% {transform: translateY(-10vh) scale(1);}
}
</style>

</head>

<body>

<div id="intro" onclick="startExperience()">
  Tap to open 💖
</div>

<div class="container" id="main">

  <h1 id="typing"></h1>

  <p>
    Today is yours, Jasmine… and I hope you feel just how special you are 💫
  </p>

  <p>
    You deserve happiness, peace, and everything good life has to offer.
  </p>

  <button onclick="reveal()">Click me 💌</button>

  <p id="hidden" style="display:none;">
    You mean more than you think… and I’m really glad you exist.  
    Happy Birthday ❤️
  </p>

  <iframe style="margin-top:20px; border-radius:12px"
    src="https://open.spotify.com/embed/track/4jyyma8YdFC4S4llusSFRu"
    width="300" height="80" frameborder="0">
  </iframe>

</div>

<script>
// Start animation
function startExperience() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.opacity = "1";
  typeText();
  createHearts();
}

// Typing effect
let text = "🎂 Happy Birthday Jasmine";
let i = 0;

function typeText() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 80);
  }
}

// Reveal message + fireworks
function reveal() {
  document.getElementById("hidden").style.display = "block";
  fireworks();
}

    heart.className = "heart";
